<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <!-- Primary Meta Tags -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="description"
        content="Find your dream property with EstateElite - India's most trusted real estate platform. Browse thousands of properties for sale and rent across India." />
    <meta name="keywords"
        content="real estate, property, buy house, rent apartment, home loan, property in india, real estate agent" />

    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />

    <meta name="theme-color" content="#2563eb" />
    <meta name="msapplication-TileColor" content="#2563eb" />

    <!-- Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="EstateElite" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://estateelite.com/" />
    <meta property="og:title" content="EstateElite - Find Your Dream Home" />
    <meta property="og:description"
        content="Discover the perfect property from our extensive collection of homes, apartments, and villas across India." />

    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="EstateElite" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://estateelite.com/" />
    <meta name="twitter:title" content="EstateElite - Find Your Dream Home" />
    <meta name="twitter:description"
        content="Discover the perfect property from our extensive collection of homes, apartments, and villas across India." />
    <meta name="twitter:image" content="https://estateelite.com/twitter-image.jpg" />
    <meta name="twitter:site" content="@estateelite" />
    <meta name="twitter:creator" content="@estateelite" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://estateelite.com/" />

    <!-- Preconnect to important domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- Preload critical fonts -->

        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap"

    <!-- Fonts -->

        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap"

    <link rel="manifest" href="/site.webmanifest" />

    <title>EstateElite - India's Most Trusted Real Estate Platform</title>

        "@context": "https://schema.org",
        "@type": "RealEstateAgent",
        "name": "EstateElite",
        "url": "https://estateelite.com",
        "logo": "https://estateelite.com/logo.png",

            "https://www.facebook.com/estateelite",
            "https://www.twitter.com/estateelite",

            "addressRegion": "Karnataka",
            "postalCode": "560034",
            "addressCountry": "IN"
        },
        "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+91-8252574386",
            "contactType": "customer service",
            "availableLanguage": ["English", "Hindi"]
        }
    }
